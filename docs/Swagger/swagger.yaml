    patch:
      tags:
        - Missions
      summary: Complete timeline with outcome
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimelineCompleteInput"
      responses:
        "200":
          description: Timeline completed successfully

  /api/timelines/{id}/fail:
    patch:
      tags:
        - Missions
      summary: Mark timeline as FAILED
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimelineFailInput"
      responses:
        "200":
          description: Timeline marked failed successfully

  /api/timelines/{id}/withdraw:
    patch:
      tags:
        - Missions
      summary: Team withdraws assigned timeline
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimelineWithdrawInput"
      responses:
        "200":
          description: Timeline withdrawn successfully

  /api/timelines/{id}/cancel:
    patch:
      tags:
        - Missions
      summary: Coordinator cancels assigned timeline
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimelineCancelInput"
      responses:
        "200":
          description: Timeline cancelled successfully

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - userName
        - displayName
        - email
        - phoneNumber
        - password
      properties:
        userName:
          type: string
          minLength: 3
          maxLength: 50
          example: "nguyenvana"
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          example: "Nguyen Van A"
        email:
          type: string
          format: email
          example: "nguyenvana@example.com"
        phoneNumber:
          type: string
          pattern: "^[0-9]{10,11}$"
          example: "0901234567"
          description: "Required phone number (10-11 digits)"
        password:
          type: string
          minLength: 6
          maxLength: 100
          example: "password123"
        role:
          type: string
          enum:
            - Citizen
            - Rescue Team
            - Rescue Coordinator
            - Manager
            - Admin
          default: Citizen

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "nguyenvana@example.com"
        password:
          type: string
          example: "password123"

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: "#/components/schemas/User"

    AuthRegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Đăng ký thành công"
        data:
          type: object
          properties:
            message:
              type: string
              example: "Đăng ký thành công"
            userId:
              type: string
              example: "60d5ec49f1b2c8b1f8e4e1a1"

    AuthLoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Đăng nhập thành công"
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            user:
              $ref: "#/components/schemas/User"

    AuthRefreshResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Refresh token thành công"
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            user:
              $ref: "#/components/schemas/User"

    AuthMeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"
        data:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a1"
        userName:
          type: string
          example: "nguyenvana"
        displayName:
          type: string
          example: "Nguyen Van A"
        email:
          type: string
          example: "nguyenvana@example.com"
        phoneNumber:
          type: string
          example: "0901234567"
        avatarUrl:
          type: string
          example: "https://cloudinary.com/avatar.jpg"
        avatarId:
          type: string
          example: "avatar_public_id"
        isActive:
          type: boolean
          example: true
        role:
          type: string
          enum:
            - Citizen
            - Rescue Team
            - Rescue Coordinator
            - Manager
            - Admin
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRescueTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: "Team Alpha"
        status:
          type: string
          enum:
            - Active
            - Offline
            - Busy
          default: Active

    AddTeamMemberRequest:
      type: object
      required:
        - memberName
        - teamName
      properties:
        memberName:
          type: string
          example: "Nguyen Van B"
        teamName:
          type: string
          example: "Team Alpha"
        memberRole:
          type: string
          enum:
            - Leader
            - Member
            - Driver
            - Medic
          default: Member

    CreateRequestInput:
      type: object
      required:
        - type
        - location
        - description
      properties:
        type:
          type: string
          enum:
            - Rescue
            - Relief
          description: Type of request - Rescue or Relief
          example: Rescue
        incidentType:
          type: string
          enum:
            - Flood
            - Trapped
            - Injured
            - Landslide
            - Other
          description: Type of incident
          default: Other
          example: Flood
        location:
          $ref: "#/components/schemas/GeoPoint"
        description:
          type: string
          minLength: 10
          maxLength: 500
          description: Detailed description of the situation
          example: "Trapped in flooded house on second floor, water rising quickly. 3 people including 1 elderly person."
        peopleCount:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
          description: Number of people affected
          example: 3
        requestSupplies:
          type: array
          items:
            $ref: "#/components/schemas/RequestSupplyItem"
          description: List of requested supplies
          example:
            - supplyId: "60d5ec49f1b2c8b1f8e4e1a7"
              requestedQty: 2
        imageUrls:
          type: array
          items:
            type: string
            format: uri
          maxItems: 5
          description: URLs of images showing the situation (max 5)
          example:
            ["https://example.com/image1.jpg", "https://example.com/image2.jpg"]

    GeoPoint:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - Point
          default: Point
          example: Point
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          example: [106.660172, 10.762622]

    RequestSupplyItem:
      type: object
      required:
        - supplyId
        - requestedQty
      properties:
        supplyId:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a7"
        requestedQty:
          type: integer
          minimum: 1
          example: 2

    Request:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a3"
        userName:
          type: string
          description: Name of the requester
          example: "Nguyen Van A"
        userId:
          type: string
          nullable: true
          description: ID of the citizen user (null for unregistered citizens)
          example: "60d5ec49f1b2c8b1f8e4e1a1"
        createdBy:
          type: string
          description: ID of the user who created this request
          example: "60d5ec49f1b2c8b1f8e4e1a1"
        source:
          type: string
          enum:
            - CITIZEN
            - COORDINATOR
          description: Origin of the request
          example: CITIZEN
        phoneNumber:
          type: string
          nullable: true
          description: Phone number of the requester
          example: "0901234567"
        type:
          type: string
          enum:
            - Rescue
            - Relief
          example: Rescue
        incidentType:
          type: string
          enum:
            - Flood
            - Trapped
            - Injured
            - Landslide
            - Other
          example: Flood
        location:
          $ref: "#/components/schemas/GeoPoint"
        description:
          type: string
          example: "Trapped in flooded house on second floor"
        peopleCount:
          type: integer
          minimum: 1
          maximum: 100
          example: 3
        priority:
          type: string
          enum:
            - Critical
            - High
            - Normal
          example: High
        status:
          type: string
          enum:
            - SUBMITTED
            - VERIFIED
            - REJECTED
            - IN_PROGRESS
            - PARTIALLY_FULFILLED
            - FULFILLED
            - CLOSED
            - CANCELLED
          example: SUBMITTED
        requestSupplies:
          type: array
          items:
            $ref: "#/components/schemas/RequestSupplyItem"
        media:
          type: array
          items:
            type: object
            properties:
              imageUrl:
                type: string
                format: uri
                example: "https://example.com/image.jpg"
              description:
                type: string
              uploadedAt:
                type: string
                format: date-time
        isDuplicated:
          type: boolean
          default: false
        duplicatedOfRequestId:
          type: string
          nullable: true
        isLocationVerified:
          type: boolean
          default: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRequestOnBehalfInput:
      type: object
      required:
        - type
        - location
        - description
      properties:
        citizenId:
          type: string
          description: ID of an existing citizen user. If provided, userName and phoneNumber are forbidden.
          example: "60d5ec49f1b2c8b1f8e4e1a1"
        userName:
          type: string
          minLength: 2
          maxLength: 100
          description: Required when citizenId is not provided
          example: "Tran Van B"
        phoneNumber:
          type: string
          pattern: "^[0-9]{10,11}$"
          description: Required when citizenId is not provided
          example: "0987654321"
        type:
          type: string
          enum:
            - Rescue
            - Relief
          example: Rescue
        incidentType:
          type: string
          enum:
            - Flood
            - Trapped
            - Injured
            - Landslide
            - Other
          default: Other
        location:
          $ref: "#/components/schemas/GeoPoint"
        description:
          type: string
          minLength: 10
          maxLength: 500
          example: "Citizen called via hotline, trapped on rooftop."
        peopleCount:
          type: integer
          minimum: 1
          maximum: 100
          default: 1
        priority:
          type: string
          enum:
            - Critical
            - High
            - Normal
          default: Normal
          description: Coordinator can set priority at creation
        requestSupplies:
          type: array
          items:
            $ref: "#/components/schemas/RequestSupplyItem"
        imageUrls:
          type: array
          items:
            type: string
            format: uri
          maxItems: 5

    RequestResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Request created successfully"
        data:
          $ref: "#/components/schemas/Request"

    RequestListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Request"
        meta:
          $ref: "#/components/schemas/Pagination"

    SearchCitizensResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Success"
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"

    VerifyRequestInput:
      type: object
      required:
        - approved
      properties:
        approved:
          type: boolean
          example: true
        priority:
          type: string
          enum:
            - Critical
            - High
            - Normal
          description: Required only when approved is true
          example: High
        reason:
          type: string
          maxLength: 500
          description: Required only when approved is false
          example: "Duplicate request"

    CancelRequestInput:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
          example: "Resolved already"

    MarkDuplicateInput:
      type: object
      required:
        - duplicatedOfRequestId
      properties:
        duplicatedOfRequestId:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a3"

    UpdateLocationInput:
      type: object
      required:
        - location
      properties:
        location:
          $ref: "#/components/schemas/GeoPoint"
        isLocationVerified:
          type: boolean
          default: true
          example: true

    UpdatePriorityInput:
      type: object
      required:
        - priority
      properties:
        priority:
          type: string
          enum:
            - Critical
            - High
            - Normal
          example: High

    CreateMissionRequest:
      type: object
      required:
        - teamId
        - requestIds
      properties:
        teamId:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a2"
        requestIds:
          type: array
          items:
            type: string
          example: ["60d5ec49f1b2c8b1f8e4e1a3"]
        vehicleId:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a6"

    Mission:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a4"
        teamId:
          type: string
        requestIds:
          type: array
          items:
            type: string
        vehicleId:
          type: string
        status:
          type: string
          enum:
            - Assigned
            - InProgress
            - Completed
            - Cancelled
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Position:
      type: object
      properties:
        missionId:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a4"
        latitude:
          type: number
          format: double
          example: 10.762622
        longitude:
          type: number
          format: double
          example: 106.660172
        timestamp:
          type: string
          format: date-time

    Resource:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a6"
        name:
          type: string
          example: "Rescue Boat #1"
        type:
          type: string
          enum:
            - Boat
            - Truck
            - Ambulance
            - Helicopter
            - Equipment
        capacity:
          type: integer
          example: 10
        status:
          type: string
          enum:
            - Available
            - In Use
            - Maintenance
            - Unavailable
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Supply:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a7"
        name:
          type: string
          example: "Water Bottles"
        quantity:
          type: integer
          example: 1000
        unit:
          type: string
          example: "bottles"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a8"
        userId:
          type: string
        title:
          type: string
          example: "New Mission Assigned"
        message:
          type: string
          example: "You have been assigned to Mission #123"
        type:
          type: string
          enum:
            - Info
            - Warning
            - Success
            - Error
        isRead:
          type: boolean
          default: false
        createdAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        _id:
          type: string
          example: "60d5ec49f1b2c8b1f8e4e1a9"
        name:
          type: string
          example: "Emergency Types"
        values:
          type: array
          items:
            type: string

    SummaryReport:
      type: object
      properties:
        totalRequests:
          type: integer
          example: 150
        pendingRequests:
          type: integer
          example: 20
        completedMissions:
          type: integer
          example: 100
        activeTeams:
          type: integer
          example: 10
        totalResourcesUsed:
          type: integer
          example: 45

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5

    Timeline:
      type: object
      properties:
        _id:
          type: string
          example: "65f1d2c3b4a5968776655443"
        missionId:
          type: string
          example: "65f1d2c3b4a5968776655111"
        requestId:
          type: string
          example: "65f1d2c3b4a5968776655222"
        teamId:
          type: string
          example: "65f1d2c3b4a5968776655333"
        status:
          type: string
          enum:
            - ASSIGNED
            - EN_ROUTE
            - ON_SITE
            - COMPLETED
            - PARTIAL
            - FAILED
            - WITHDRAWN
            - CANCELLED
        assignedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        arrivedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        rescuedCount:
          type: integer
          minimum: 0
          example: 4
        failureReason:
          type: string
          nullable: true
        withdrawalReason:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TimelineCompleteInput:
      type: object
      required:
        - outcome
      properties:
        outcome:
          type: string
          enum:
            - COMPLETED
            - PARTIAL
        note:
          type: string
          nullable: true
        rescuedCount:
          type: integer
          minimum: 0

    TimelineFailInput:
      type: object
      required:
        - failureReason
      properties:
        failureReason:
          type: string
        note:
          type: string
          nullable: true

    TimelineWithdrawInput:
      type: object
      required:
        - withdrawalReason
      properties:
        withdrawalReason:
          type: string
        note:
          type: string
          nullable: true

    TimelineCancelInput:
      type: object
      properties:
        note:
          type: string
          nullable: true

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "An error occurred"
        code:
          type: string
          example: "ERROR_CODE"

    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Lỗi khi đăng nhập"
        data:
          nullable: true
          example: null
        error:
          type: object
          properties:
            code:
              type: string
              example: "INTERNAL_ERROR"
            details:
              type: object
              nullable: true

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token authentication. Format: `Bearer <token>`"
