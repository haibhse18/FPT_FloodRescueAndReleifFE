openapi: 3.0.4
info:
  title: Flood Rescue & Relief System API
  description: |-
    API documentation for Flood Rescue & Relief Management System.

    This system manages rescue and relief operations during flood emergencies, including:
    - User authentication and authorization
    - Emergency rescue/relief requests
    - Mission assignment and tracking
    - Resource and inventory management
    - Real-time team position tracking
    - Notifications and reporting

    **Roles:**
    - Citizen: Can submit requests and view their status
    - Rescue Team: Receives and executes missions
    - Rescue Coordinator: Manages requests and assigns missions
    - Manager: Manages resources and inventory
    - Admin: Full system access

    **Production Server:** https://flood-rescue.onrender.com
  contact:
    email: duylase184704@fpt.edu.vn
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
servers:
  - url: https://flood-rescue.onrender.com
    description: Production server
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Auth
    description: Authentication and user management
  - name: Requests
    description: Rescue and relief request operations
  - name: Missions
    description: Mission management and tracking
  - name: Teams
    description: Rescue team management
  - name: Resources
    description: Vehicle and equipment management
  - name: Inventory
    description: Relief supplies and inventory management
  - name: Notifications
    description: System notifications
  - name: Reports
    description: Reporting and analytics
  - name: Admin
    description: Administrative operations
  - name: System
    description: System configuration and settings

paths:
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register new user account
      description: Register a new user account (default role is Citizen)
      operationId: register
      requestBody:
        description: User registration information
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRegisterResponse"
        "400":
          description: Invalid input or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: User login
      description: |-
        Login to the system with email and password.
        Returns access token in response body and refresh token in HTTP-only cookie.
      operationId: login
      requestBody:
        description: Login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful. Refresh token is set in HTTP-only cookie.
          headers:
            Set-Cookie:
              description: HTTP-only cookie containing refresh token (7 days)
              schema:
                type: string
                example: refreshToken=abc123...; HttpOnly; Secure; SameSite=None; Max-Age=604800
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: |
        Refresh access token bằng refresh token lưu trong HTTP-only cookie. Không cần Authorization header.
      operationId: refreshToken
      parameters:
        - name: refreshToken
          in: cookie
          required: true
          description: Refresh token được set trong cookie khi đăng nhập
          schema:
            type: string
      responses:
        "200":
          description: Refresh thành công, trả về access token mới
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRefreshResponse"
        "401":
          description: Refresh token không hợp lệ hoặc đã hết hạn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user information
      description: Get information of currently authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: |-
        Logout user by deleting refresh token from database and clearing cookie.
        Requires refresh token in HTTP-only cookie.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logout successful. Cookie is cleared.
        "401":
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: No refresh token found in cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests:
    get:
      tags:
        - Requests
      summary: List all requests
      description: "Get list of rescue/relief requests with pagination and filtering (Roles: Rescue Coordinator, Rescue Team)"
      operationId: listRequests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by request status
          required: false
          schema:
            type: string
            enum:
              - SUBMITTED
              - VERIFIED
              - REJECTED
              - IN_PROGRESS
              - PARTIALLY_FULFILLED
              - FULFILLED
              - CLOSED
              - CANCELLED
        - name: type
          in: query
          description: Filter by request type
          required: false
          schema:
            type: string
            enum:
              - Rescue
              - Relief
        - name: incidentType
          in: query
          description: Filter by incident type
          required: false
          schema:
            type: string
            enum:
              - Flood
              - Trapped
              - Injured
              - Landslide
              - Other
        - name: priority
          in: query
          description: Filter by priority level
          required: false
          schema:
            type: string
            enum:
              - Critical
              - High
              - Normal
        - name: userName
          in: query
          description: Filter by requester name (case-insensitive)
          required: false
          schema:
            type: string
        - name: source
          in: query
          description: Filter by request source
          required: false
          schema:
            type: string
            enum:
              - CITIZEN
              - COORDINATOR
        - name: createdBy
          in: query
          description: Filter by creator ID (ObjectId)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Requests retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

    post:
      tags:
        - Requests
      summary: Create new request
      description: Create a new rescue or relief request (Citizen only)
      operationId: addRequest
      security:
        - bearerAuth: []
      requestBody:
        description: Request information
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequestInput"
      responses:
        "201":
          description: Request created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Invalid input or validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/my:
    get:
      tags:
        - Requests
      summary: Get my requests
      description: "Get all requests submitted by the current user with pagination and filtering (Role: Citizen)"
      operationId: getMyRequests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by request status
          required: false
          schema:
            type: string
            enum:
              - SUBMITTED
              - VERIFIED
              - REJECTED
              - IN_PROGRESS
              - PARTIALLY_FULFILLED
              - FULFILLED
              - CLOSED
              - CANCELLED
        - name: type
          in: query
          description: Filter by request type
          required: false
          schema:
            type: string
            enum:
              - Rescue
              - Relief
        - name: incidentType
          in: query
          description: Filter by incident type
          required: false
          schema:
            type: string
            enum:
              - Flood
              - Trapped
              - Injured
              - Landslide
              - Other
        - name: priority
          in: query
          description: Filter by priority level
          required: false
          schema:
            type: string
            enum:
              - Critical
              - High
              - Normal
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Requests retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/{requestId}:
    get:
      tags:
        - Requests
      summary: Get request detail
      description: Get detailed information about a specific request
      operationId: getRequestDetail
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          description: Request ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request detail retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/{requestId}/verify:
    patch:
      tags:
        - Requests
      summary: Verify or reject request
      description: Coordinator verifies or rejects a request (SUBMITTED → VERIFIED/REJECTED)
      operationId: verifyRequest
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          description: Request ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequestInput"
      responses:
        "200":
          description: Request verified or rejected successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Invalid input or transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - Coordinator only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/{requestId}/close:
    patch:
      tags:
        - Requests
      summary: Close request
      description: Coordinator closes a request (FULFILLED/PARTIALLY_FULFILLED → CLOSED)
      operationId: closeRequest
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          description: Request ID
          schema:
            type: string
      responses:
        "200":
          description: Request closed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - Coordinator only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/{requestId}/duplicate:
    patch:
      tags:
        - Requests
      summary: Mark request as duplicate
      description: Coordinator marks a request as duplicate of another request
      operationId: markDuplicate
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          description: Request ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkDuplicateInput"
      responses:
        "200":
          description: Request marked as duplicate successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Invalid input or status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - Coordinator only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/{requestId}/location:
    patch:
      tags:
        - Requests
      summary: Update request location
      description: Coordinator updates and verifies request location
      operationId: updateRequestLocation
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          description: Request ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationInput"
      responses:
        "200":
          description: Request location updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - Coordinator only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/{requestId}/priority:
    patch:
      tags:
        - Requests
      summary: Update request priority
      description: Coordinator updates request priority
      operationId: updateRequestPriority
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          description: Request ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePriorityInput"
      responses:
        "200":
          description: Request priority updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - Coordinator only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/{requestId}/cancel:
    patch:
      tags:
        - Requests
      summary: Cancel request
      description: Citizen cancels own request or Coordinator cancels any SUBMITTED request
      operationId: cancelRequest
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          description: Request ID
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRequestInput"
      responses:
        "200":
          description: Request cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Invalid input or status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - not request owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/on-behalf:
    post:
      tags:
        - Requests
      summary: Create request on behalf of citizen
      description: |
        Coordinator creates a request on behalf of a citizen.
        - If `citizenId` is provided: links to existing citizen account, checks 1 active request rule.
        - If `citizenId` is NOT provided: requires `userName` and `phoneNumber` for unregistered citizen.
        - Status is automatically set to `VERIFIED`.
        - `source` is set to `COORDINATOR`, `createdBy` = coordinator ID.
      operationId: createRequestOnBehalf
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequestOnBehalfInput"
      responses:
        "201":
          description: Request created on behalf successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestResponse"
        "400":
          description: Validation failed or citizen has active request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - Coordinator only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Citizen not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/requests/search-citizens:
    get:
      tags:
        - Requests
      summary: Search citizens for on-behalf creation
      description: |
        Coordinator searches for citizens by display name or phone number.
        Only returns active users with role = Citizen. Limited to 10 results.
      operationId: searchCitizens
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Search keyword (min 2 characters)
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Citizens found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCitizensResponse"
        "400":
          description: Search query too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden - Coordinator only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/missions:
    post:
      tags:
        - Missions
      summary: Create mission
      description: Create a new rescue mission and assign to a team (Coordinator only)
      operationId: createMission
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMissionRequest"
      responses:
        "201":
          description: Mission created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  missionId:
                    type: string
                    example: "60d5ec49f1b2c8b1f8e4e1a4"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/missions/assigned:
    get:
      tags:
        - Missions
      summary: Get assigned missions
      description: Get missions assigned to current user's rescue team
      operationId: getAssignedMissions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Missions retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mission"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/missions/{id}:
    get:
      tags:
        - Missions
      summary: Get mission detail
